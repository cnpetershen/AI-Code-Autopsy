name: AI Code Autopsy CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  autopsy:
    runs-on: ubuntu-latest
    name: Autopsy AI-generated code
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run AI Code Autopsy CI
        id: autopsy
        run: |
          npx ai-code-autopsy ci src/ --threshold 0.5 > /tmp/autopsy-result.json 2>&1 || true
          echo "autopsy_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Parse and display results
        id: parse
        run: |
          RESULT=$(cat /tmp/autopsy-result.json)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          SCORE=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).result.score))")
          PASSED=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).result.passed))")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT

      - name: Post results as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = '/tmp/autopsy-result.json';
            try {
              const raw = fs.readFileSync(resultPath, 'utf-8');
              const parsed = JSON.parse(raw);
              const r = parsed.result;
              const severityTable = Object.entries(r.severityBreakdown || {})
                .map(([k, v]) => `| ${k} | ${v} |`).join('\n');
              const body = `## đź”Ť AI Code Autopsy Results\n\n` +
                `| Metric | Value |\n|--------|-------|\n` +
                `| **AI Score** | ${r.score}/100 |\n` +
                `| **Verdict** | ${r.verdict} |\n` +
                `| **Findings** | ${r.totalFindings} |\n` +
                `| **Threshold** | ${r.threshold}/100 |\n` +
                `| **Status** | ${r.passed ? 'âś… PASSED' : 'âťŚ FAILED'} |\n\n` +
                (severityTable ? `**Severity Breakdown:**\n| Level | Count |\n|-------|-------|\n${severityTable}\n\n` : '') +
                `**Summary:**\n\`\`\`\n${parsed.summary}\n\`\`\``;
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            } catch (e) {
              console.log('Could not post PR comment:', e.message);
            }

      - name: Check autopsy result
        run: |
          if [ "${{ steps.parse.outputs.passed }}" = "false" ]; then
            echo "âťŚ AI Code Autopsy failed - AI score exceeds threshold"
            exit 1
          fi
          echo "âś… AI Code Autopsy passed"
